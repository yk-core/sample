name: Join files into joined.js

on:
  push:
    branches: [main]

jobs:
  join:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Join files
        run: |
          if [ -f file1.js ] && [ -f file2.js ]; then
            cat file1.js file2.js > joined.js
            echo "Files joined into joined.js"
          else
            echo "One or both files missing"
            exit 0
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add joined.js

          git commit -m "Generate joined.js [skip ci]" || echo "No changes to commit"
          git push
